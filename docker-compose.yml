services:
  postgres:
    image: postgres:16
    container_name: sinapsis_db
    environment:
      POSTGRES_USER: sinapsis
      POSTGRES_PASSWORD: sinapsis123
      POSTGRES_DB: sinapsis
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sinapsis"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      network: host
    container_name: sinapsis_backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: sinapsis
      DB_PASSWORD: sinapsis123
      DB_NAME: sinapsis
      JWT_SECRET: changeme_in_production
      SERVER_PORT: "8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      network: host
    container_name: sinapsis_frontend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    depends_on:
      - backend

volumes:
  pgdata:
