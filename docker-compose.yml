services:
  postgres:
    image: postgres:16
    container_name: sinapsis_db
    environment:
      POSTGRES_USER: sinapsis
      POSTGRES_PASSWORD: sinapsis123
      POSTGRES_DB: sinapsis
      TZ: America/Bogota
      PGTZ: America/Bogota
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./init.sql:/docker-entrypoint-initdb.d/02-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sinapsis"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: sinapsis_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"   # management UI: http://localhost:15672 (guest/guest)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: ./backend
      # network: host
    container_name: sinapsis_backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: sinapsis
      DB_PASSWORD: sinapsis123
      DB_NAME: sinapsis
      JWT_SECRET: changeme_in_production
      SERVER_PORT: "8080"
      TZ: America/Bogota
      UPLOADS_DIR: /app/uploads
      # RabbitMQ — microservicio IA
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      RABBITMQ_REQUEST_QUEUE: ai.analysis.requests
      RABBITMQ_RESULT_EXCHANGE: sinapsis.ai
      RABBITMQ_RESULT_ROUTING_KEY: ai.analysis.result
      RABBITMQ_RESULT_QUEUE: backend.ai.results
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  sinapsis-ai:
    build:
      context: ./microservice
    container_name: sinapsis_ai
    restart: on-failure
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      RABBITMQ_REQUEST_QUEUE: ai.analysis.requests
      RABBITMQ_RESULT_EXCHANGE: sinapsis.ai
      RABBITMQ_RESULT_ROUTING_KEY: ai.analysis.result
      RABBITMQ_PREFETCH: "1"
      BUNDLE_CACHE_DIR: /app/.bundle_cache
      BUNDLE_SOURCE: monaihosting
      # Habilitar los cuatro modelos MONAI
      ALLOWED_ANALYSIS_TYPES: ct_spleen_segmentation,ct_lung_nodule_detection,mri_brain_tumor_segmentation,xr_breast_density_classification
      MODEL_DEVICE: cpu
      IMAGE_STORAGE_BACKEND: file
      LOG_LEVEL: INFO
    volumes:
      - bundle_cache:/app/.bundle_cache
      - uploads:/app/uploads   # imagen de entrada accesible por el worker
    depends_on:
      rabbitmq:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      # network: host
    container_name: sinapsis_frontend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
  bundle_cache:
